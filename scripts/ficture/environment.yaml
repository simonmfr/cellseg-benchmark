name: ficture
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  - htslib=1.6
  - pip
  - pip:
      - ficture==0.0.4.0
      - numpy==2.3.1
      - pandas==2.3.0
      - scipy==1.16.0
      - scikit-learn==1.7.0
      - matplotlib==3.10.3
      - pillow==11.3.0
      - opencv-python==4.11.0.86
      - jinja2==3.1.6
      - ete3==3.1.3
      - shapely==2.1.1
      - geopandas==1.1.1
      - pyproj==3.7.1
      - pyogrio==0.11.0
      - geojson==3.2.0
      - mpmath==1.3.0
